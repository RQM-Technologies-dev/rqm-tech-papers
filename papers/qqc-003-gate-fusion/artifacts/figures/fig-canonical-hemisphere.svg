<svg xmlns="http://www.w3.org/2000/svg" width="860" height="320" viewBox="0 0 860 320" role="img" aria-labelledby="title desc">
  <title id="title">Canonical hemisphere for fused quaternion representatives</title>
  <desc id="desc">Diagram showing antipodal identification on the unit three-sphere, the preferred hemisphere with w greater than or equal to zero, and deterministic sign selection for fused representatives.</desc>
  <rect x="0" y="0" width="860" height="320" fill="#ffffff"/>
  <circle cx="235" cy="160" r="112" fill="#eef5ff" stroke="#2f5fa7" stroke-width="2.5"/>
  <path d="M235 48 A112 112 0 0 1 235 272" fill="none" stroke="#2f5fa7" stroke-width="2.5" stroke-dasharray="7 5"/>
  <line x1="235" y1="48" x2="235" y2="272" stroke="#6d87aa" stroke-width="2"/>
  <circle cx="190" cy="105" r="6" fill="#245124"/>
  <circle cx="280" cy="215" r="6" fill="#8f2424"/>
  <text x="190" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#245124">q</text>
  <text x="280" y="237" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#8f2424">-q</text>
  <text x="235" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#334">unit Sģ model</text>
  <text x="185" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#334">prefer w &gt; 0</text>
  <text x="302" y="160" font-family="Arial, sans-serif" font-size="15" fill="#666">equator w = 0</text>
  <line x1="364" y1="160" x2="472" y2="160" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="418" y="141" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">sign-canonicalization</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#333"/>
    </marker>
  </defs>
  <rect x="505" y="54" width="300" height="210" rx="18" ry="18" fill="#f9fbff" stroke="#91a3c5" stroke-width="2"/>
  <text x="655" y="88" text-anchor="middle" font-family="Georgia, serif" font-size="23" fill="#1a1a1a">Deterministic representative</text>
  <text x="540" y="125" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">1. Normalize quaternion product.</text>
  <text x="540" y="155" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">2. If w &gt; 0, keep the sign.</text>
  <text x="540" y="185" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">3. If w &lt; 0, negate the tuple.</text>
  <text x="540" y="215" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">4. If w = 0, use first-nonzero-positive on (x, y, z).</text>
  <text x="655" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#555">The rule resolves q ~ -q without changing the represented segment action modulo global phase.</text>
</svg>
