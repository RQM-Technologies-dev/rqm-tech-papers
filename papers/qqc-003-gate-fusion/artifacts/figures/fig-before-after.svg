<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">Before and after single-qubit segment simplification</title>
  <desc id="desc">Side-by-side schematic showing an original gate list and its fused reconstructed output after quaternionic gate fusion.</desc>
  <style>
    .panel { fill: #f9fbff; stroke: #37517a; stroke-width: 2; rx: 16; ry: 16; }
    .title { font: 700 22px Arial, sans-serif; fill: #17345f; }
    .gate { fill: #ffffff; stroke: #2e466a; stroke-width: 1.8; rx: 10; ry: 10; }
    .label { font: 600 16px Arial, sans-serif; fill: #162945; }
    .body { font: 15px Arial, sans-serif; fill: #333; }
    .metric { font: 16px Arial, sans-serif; fill: #2b5f2d; }
    .arrow { stroke: #36588f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#36588f"/>
    </marker>
  </defs>

  <rect class="panel" x="30" y="35" width="360" height="175"/>
  <text class="title" x="55" y="70">Original segment</text>
  <rect class="gate" x="60" y="102" width="74" height="42"/>
  <text class="label" x="97" y="129" text-anchor="middle">S</text>
  <rect class="gate" x="155" y="102" width="74" height="42"/>
  <text class="label" x="192" y="129" text-anchor="middle">T</text>
  <rect class="gate" x="250" y="102" width="74" height="42"/>
  <text class="label" x="287" y="129" text-anchor="middle">T </text>
  <rect class="gate" x="105" y="160" width="74" height="42"/>
  <text class="label" x="142" y="187" text-anchor="middle">Z</text>
  <text class="body" x="55" y="228">Gate count = 4, local depth = 4</text>

  <path class="arrow" d="M410 122 L505 122"/>

  <rect class="panel" x="530" y="35" width="360" height="175"/>
  <text class="title" x="555" y="70">Fused and reconstructed</text>
  <rect class="gate" x="675" y="102" width="74" height="42"/>
  <text class="label" x="712" y="129" text-anchor="middle">S </text>
  <text class="body" x="555" y="174">q_fused = (sqrt(2)/2, 0, 0, -sqrt(2)/2)</text>
  <text class="metric" x="555" y="200">Gate count = 1, local depth = 1</text>
  <text class="metric" x="555" y="224">Exact equivalence preserved modulo global phase</text>
</svg>
