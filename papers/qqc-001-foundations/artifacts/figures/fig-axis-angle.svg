<svg xmlns="http://www.w3.org/2000/svg" width="720" height="360" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Axis-angle and quaternion composition schematic</title>
  <desc id="desc">A Bloch-sphere style circle with an axis n-hat and rotation angle theta over two, alongside a symbolic quaternion multiplication rule showing scalar and cross-product terms.</desc>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #222; }
    .small { font-size: 16px; }
    .label { font-size: 18px; font-weight: bold; }
    .math { font-size: 20px; font-style: italic; }
    .thin { stroke: #666; stroke-width: 1.5; fill: none; }
    .heavy { stroke: #1f4f99; stroke-width: 3; fill: none; }
    .accent { stroke: #b22222; stroke-width: 3; fill: none; }
    .dot { fill: #1f4f99; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <circle cx="180" cy="180" r="110" class="thin"/>
  <ellipse cx="180" cy="180" rx="110" ry="42" class="thin"/>
  <line x1="180" y1="290" x2="180" y2="70" class="thin"/>
  <line x1="180" y1="180" x2="250" y2="110" class="heavy"/>
  <polygon points="250,110 239,113 243,117" fill="#1f4f99"/>
  <text x="258" y="107" class="math">n</text>
  <path d="M 222 168 A 48 48 0 0 0 203 129" class="accent"/>
  <polygon points="202,129 207,137 211,131" fill="#b22222"/>
  <text x="227" y="144" class="math">Ė/2</text>
  <text x="112" y="36" class="label">Axis-angle form</text>
  <text x="64" y="328" class="small">q = cos(Ė/2) + sin(Ė/2)(n_x i + n_y j + n_z k)</text>
  <line x1="345" y1="50" x2="345" y2="310" stroke="#cccccc" stroke-width="2"/>
  <text x="395" y="38" class="label">Composition law</text>
  <text x="386" y="112" class="math">(aü + vü)(aé + vé)</text>
  <text x="386" y="150" class="math">= (aüaé  vüĘvé)</text>
  <text x="386" y="184" class="math">  + (aüvé + aévü + vüūvé)</text>
  <text x="386" y="236" class="small">The cross-product term makes noncommutativity visible.</text>
  <text x="386" y="266" class="small">Quaternion multiplication encodes rotation composition directly.</text>
</svg>
