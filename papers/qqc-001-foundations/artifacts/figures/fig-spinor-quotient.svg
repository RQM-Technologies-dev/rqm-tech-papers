<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Normalized spinors, projective quotient, and Bloch sphere</title>
  <desc id="desc">A schematic showing normalized spinors as points on S3 inside C2 isomorphic to R4, quotient by global phase U1, and pure states on CP1 isomorphic to the Bloch sphere S2.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#333"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="300" fill="#ffffff"/>
  <ellipse cx="170" cy="150" rx="120" ry="95" fill="#eef5ff" stroke="#2f5fa7" stroke-width="2"/>
  <text x="170" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1a1a1a">Sģ</text>
  <text x="170" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">normalized spinors</text>
  <text x="170" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">in C&#178; &#8773; R&#8308;</text>
  <circle cx="170" cy="150" r="6" fill="#2f5fa7"/>
  <ellipse cx="170" cy="150" rx="70" ry="22" fill="none" stroke="#6e90c4" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="170" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">U(1) phase fibers</text>
  <line x1="300" y1="150" x2="430" y2="150" stroke="#333" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="365" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">quotient by global phase</text>
  <text x="365" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">Sģ / U(1)</text>
  <text x="365" y="181" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">= CPđ</text>
  <circle cx="650" cy="150" r="92" fill="#f8f8f8" stroke="#3d3d3d" stroke-width="2"/>
  <ellipse cx="650" cy="150" rx="92" ry="28" fill="none" stroke="#999" stroke-width="1.8"/>
  <line x1="650" y1="58" x2="650" y2="242" stroke="#999" stroke-width="1.8"/>
  <line x1="558" y1="150" x2="742" y2="150" stroke="#999" stroke-width="1.8"/>
  <circle cx="650" cy="58" r="4.5" fill="#111"/>
  <circle cx="650" cy="242" r="4.5" fill="#111"/>
  <text x="650" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1a1a1a">Sē</text>
  <text x="650" y="146" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">Bloch sphere</text>
  <text x="650" y="171" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">pure states</text>
  <text x="650" y="197" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1a1a1a">CP&#185; &#8773; S&#178;</text>
  <text x="650" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">|0&gt;</text>
  <text x="650" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#444">|1&gt;</text>
  <text x="480" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">Standard distinction: Sģ is the normalized-spinor sphere; Sē is the projective pure-state sphere.</text>
</svg>
