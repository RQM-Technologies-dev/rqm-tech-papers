<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Named gate syntax to canonical quaternion IR pipeline</title>
  <desc id="desc">Schematic showing named single-qubit gates translated into unit quaternions, fused by quaternion multiplication, and canonicalized into a deterministic u1q representative.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#274c86"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="260" fill="#ffffff"/>

  <rect x="40" y="55" width="220" height="140" rx="18" ry="18" fill="#eef4ff" stroke="#335e9a" stroke-width="2"/>
  <text x="150" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#18345f">Named gate syntax</text>
  <text x="150" y="125" text-anchor="middle" font-family="Courier New, monospace" font-size="18" fill="#1f1f1f">H ; T ; Rz(pi/3)</text>
  <text x="150" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">textual program surface</text>
  <text x="150" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">not yet canonical</text>

  <line x1="260" y1="125" x2="360" y2="125" stroke="#274c86" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="310" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#274c86">translate each gate</text>

  <rect x="370" y="35" width="235" height="190" rx="18" ry="18" fill="#f8fbff" stroke="#4a4a4a" stroke-width="2"/>
  <text x="488" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#18345f">Quaternion entries</text>
  <text x="488" y="104" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1f1f1f">H  &#8594;  (0, 1/sqrt(2), 0, 1/sqrt(2))</text>
  <text x="488" y="136" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1f1f1f">T  &#8594;  (cos(pi/8), 0, 0, sin(pi/8))</text>
  <text x="488" y="168" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1f1f1f">Rz(pi/3)  &#8594;  (cos(pi/6), 0, 0, sin(pi/6))</text>
  <text x="488" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">all entries represent SU(2) modulo global phase</text>

  <line x1="605" y1="125" x2="705" y2="125" stroke="#274c86" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="655" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#274c86">multiply then canonicalize</text>

  <rect x="720" y="55" width="200" height="140" rx="18" ry="18" fill="#f3f9f3" stroke="#4d7d4d" stroke-width="2"/>
  <text x="820" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#245124">Canonical u1q</text>
  <text x="820" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1f1f1f">w &gt; 0, or</text>
  <text x="820" y="149" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#1f1f1f">equatorial tie-break</text>
  <text x="820" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">deterministic IR value</text>
  <text x="820" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">for rewrite and fusion passes</text>

  <text x="480" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">Compiler view: syntax is translated into quaternions, composed in that domain, then re-expressed as a unique canonical representative.</text>
</svg>
