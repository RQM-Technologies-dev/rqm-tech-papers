<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-labelledby="title desc">
  <title id="title">Canonical hemisphere selection on S3</title>
  <desc id="desc">Diagram showing antipodal quaternion representatives q and minus q on the unit 3-sphere, the preferred hemisphere w greater than or equal to zero, and a deterministic tie-break rule on the equator w equals zero.</desc>
  <rect width="900" height="320" fill="#ffffff"/>
  <ellipse cx="250" cy="160" rx="150" ry="110" fill="#eef5ff" stroke="#355d9a" stroke-width="2"/>
  <path d="M250 50 A150 110 0 0 1 250 270" fill="#d6e8ff" stroke="#355d9a" stroke-width="1.5"/>
  <line x1="250" y1="50" x2="250" y2="270" stroke="#355d9a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="250" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1a1a1a">S&#179; / {q, -q}</text>
  <text x="205" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#27446f">preferred region</text>
  <text x="205" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#27446f">w &gt; 0</text>
  <text x="320" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4a4a4a">mirror region</text>
  <text x="320" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4a4a4a">w &lt; 0</text>
  <circle cx="200" cy="120" r="6" fill="#1f5fbf"/>
  <circle cx="300" cy="200" r="6" fill="#444444"/>
  <line x1="200" y1="120" x2="300" y2="200" stroke="#555" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="188" y="106" font-family="Arial, sans-serif" font-size="15" fill="#1f5fbf">q</text>
  <text x="308" y="216" font-family="Arial, sans-serif" font-size="15" fill="#444">-q</text>
  <text x="250" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#444">equator w = 0 uses deterministic tie-break on (x, y, z)</text>

  <rect x="470" y="58" width="355" height="204" rx="18" ry="18" fill="#f8fbff" stroke="#cfd9ea" stroke-width="2"/>
  <text x="495" y="92" font-family="Georgia, serif" font-size="24" fill="#1a1a1a">Canonical sign rule</text>
  <text x="495" y="124" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">1. Normalize q to unit norm.</text>
  <text x="495" y="150" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">2. If w &gt; 0, keep q.</text>
  <text x="495" y="176" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">3. If w &lt; 0, replace q by -q.</text>
  <text x="495" y="202" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">4. If w = 0, inspect (x, y, z) in order.</text>
  <text x="495" y="228" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">   Choose the sign that makes the first nonzero entry positive.</text>
  <text x="495" y="252" font-family="Arial, sans-serif" font-size="15" fill="#55657b">This is a compiler convention for determinism, not a physical claim.</text>
</svg>
