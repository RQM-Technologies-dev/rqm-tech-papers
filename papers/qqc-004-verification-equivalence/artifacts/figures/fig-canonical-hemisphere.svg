<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Canonical hemisphere and sign ambiguity</title>
  <desc id="desc">Diagram showing antipodal identification q equivalent to minus q on S3, the preferred hemisphere with w greater than zero, and the equatorial tie-break used for deterministic canonicalization.</desc>
  <rect x="0" y="0" width="820" height="320" fill="#ffffff"/>
  <ellipse cx="230" cy="160" rx="135" ry="105" fill="#eef4ff" stroke="#4368a7" stroke-width="2.4"/>
  <path d="M230 55 A135 105 0 0 1 230 265" fill="#d6e7ff" stroke="#4368a7" stroke-width="2"/>
  <line x1="95" y1="160" x2="365" y2="160" stroke="#4368a7" stroke-dasharray="7 5" stroke-width="1.8"/>
  <text x="230" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#1c1c1c">S&#179;</text>
  <text x="230" y="83" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#274160">canonical hemisphere</text>
  <text x="230" y="106" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#274160">w &gt; 0 preferred</text>
  <circle cx="284" cy="117" r="6.5" fill="#254f90"/>
  <circle cx="176" cy="203" r="6.5" fill="#b34e4e"/>
  <text x="302" y="111" font-family="Arial, sans-serif" font-size="17" fill="#254f90">q</text>
  <text x="146" y="222" font-family="Arial, sans-serif" font-size="17" fill="#b34e4e">-q</text>
  <text x="230" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#3f4b5e">equator w = 0</text>
  <path d="M395 64 H764" stroke="#d8dfec" stroke-width="2"/>
  <text x="405" y="50" font-family="Georgia, serif" font-size="23" fill="#1c1c1c">Deterministic sign rule</text>
  <text x="410" y="97" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">1. Normalize the quaternion payload.</text>
  <text x="410" y="130" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">2. If w &gt; 0, keep q.</text>
  <text x="410" y="163" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">3. If w &lt; 0, replace q by -q.</text>
  <text x="410" y="196" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">4. If w = 0, inspect (x, y, z) in order.</text>
  <text x="410" y="229" font-family="Arial, sans-serif" font-size="17" fill="#2a2a2a">5. Choose the sign whose first nonzero coordinate is positive.</text>
  <rect x="404" y="250" width="337" height="42" rx="10" ry="10" fill="#f7f9fc" stroke="#cfd7e5"/>
  <text x="572" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#555">Canonicalization changes representation choice, not the represented single-qubit action modulo global phase.</text>
</svg>
