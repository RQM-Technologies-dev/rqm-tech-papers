<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Verification pipeline for quaternionic compilation</title>
  <desc id="desc">Diagram showing original and optimized segments mapped to canonical quaternions, compared by canonical equality, and cross-checked through matrix diagnostics.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#345d95"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="300" fill="#ffffff"/>
  <rect x="30" y="55" width="205" height="90" rx="14" ry="14" fill="#eef5ff" stroke="#3c69a8" stroke-width="2"/>
  <text x="132" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1e2a36">Original segment</text>
  <text x="132" y="114" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1e2a36">H ; T ; Rz(pi/3)</text>
  <rect x="30" y="170" width="205" height="90" rx="14" ry="14" fill="#eef5ff" stroke="#3c69a8" stroke-width="2"/>
  <text x="132" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#1e2a36">Optimized candidate</text>
  <text x="132" y="229" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#1e2a36">u1q(w, x, y, z)</text>

  <rect x="310" y="55" width="240" height="205" rx="16" ry="16" fill="#f7fbff" stroke="#4a77b4" stroke-width="2"/>
  <text x="430" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#19304f">Canonical trust layer</text>
  <text x="430" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2a2a2a">1. translate to quaternions</text>
  <text x="430" y="144" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2a2a2a">2. normalize</text>
  <text x="430" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2a2a2a">3. sign-canonicalize</text>
  <text x="430" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2a2a2a">4. compare canonical representatives</text>
  <text x="430" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#19304f">Can(q_orig) ?= Can(q_opt)</text>

  <rect x="625" y="55" width="290" height="205" rx="16" ry="16" fill="#fbfbfb" stroke="#666" stroke-width="2"/>
  <text x="770" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#222">Interoperability diagnostics</text>
  <text x="770" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">Matrix lift through the fixed map ¦</text>
  <text x="770" y="145" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#222">U_orig = ¦(q_orig), U_opt = ¦(q_opt)</text>
  <text x="770" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">phase-aware residual</text>
  <text x="770" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#333">trace overlap / process fidelity</text>
  <text x="770" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#555">Used as cross-checks, not as a replacement for canonical equality.</text>

  <line x1="235" y1="100" x2="310" y2="100" stroke="#345d95" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="235" y1="215" x2="310" y2="215" stroke="#345d95" stroke-width="2.6" marker-end="url(#arrow)"/>
  <line x1="550" y1="158" x2="625" y2="158" stroke="#345d95" stroke-width="2.6" marker-end="url(#arrow)"/>
  <text x="482" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">The paper defines canonical quaternion equality as the authoritative verification criterion, with matrix diagnostics for compatibility with existing toolchains.</text>
</svg>
